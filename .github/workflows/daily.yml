name: Aggiungi commits

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crea aggiornamento
        run: |
          echo "Aggiornamento $(date -u)" >> log.txt
          
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          
          git add log.txt
          git commit -m "update $(date -u)" || echo "Nessun cambiamento"
          git push
