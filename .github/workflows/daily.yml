name: Aggiungi commits

on:
  workflow_dispatch:   # Permette di cliccare "Run" manualmente

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggiungi commit
        run: |
          echo "Aggiornamento $(date -u)" >> log.txt
          git config user.name "testnetthor"
          git config user.email "testnetthor@users.noreply.github.com"
          git add log.txt
          git commit -m "update $(date -u)" || echo "no change"
          git push
