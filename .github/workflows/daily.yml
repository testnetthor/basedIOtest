name: Multi Commit

on:
  workflow_dispatch:

jobs:
  multi-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Crea 5 commits
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          
          for i in {1..5}
          do
            echo "Commit $i del $(date -u)" >> multi-log.txt
            git add multi-log.txt
            git commit -m "Auto commit $i - $(date -u)" --allow-empty
          done
          
          git push
